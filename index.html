<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>InfoVendas Demo — Mediton</title>
<style>
/* ══════════════════════════════════════
   VARIABLES & RESET
══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0B0F1A; --surf:#141926; --raised:#1A2132; --border:#1E2B40;
  --primary:#00D68F; --p2:#00A86B;
  --warn:#F6B54A; --danger:#FF5252; --blue:#5B9BF5;
  --text:#E8EDF5; --muted:#7A8AA0;
  --r:16px;
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:480px;margin:0 auto;overflow-x:hidden}

/* ══════ SCREENS ══════ */
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.active{display:flex}

/* ══════ LOADING ══════ */
#ov{display:none;position:fixed;inset:0;z-index:999;background:rgba(11,15,26,.93);align-items:center;justify-content:center;flex-direction:column;gap:14px}
#ov.on{display:flex}
.spin{width:42px;height:42px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

/* ══════ LOGIN ══════ */
#login{justify-content:center;align-items:center;padding:36px 24px;background:#fff}
.brand{text-align:center;margin-bottom:40px}
.brand-icon{width:78px;height:78px;margin:0 auto 18px;border-radius:22px;
  background:linear-gradient(135deg,var(--primary),var(--p2));
  display:flex;align-items:center;justify-content:center;font-size:34px;
  box-shadow:0 8px 30px rgba(0,214,143,.25)}
.brand h1{font-size:25px;font-weight:800;letter-spacing:-.5px}
.brand h1 em{color:var(--primary);font-style:normal}
.brand p{color:var(--muted);font-size:13px;margin-top:6px}
.fld{margin-bottom:14px;width:100%}
.fld label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#555;margin-bottom:7px}
.fld input{width:100%;padding:14px 16px;background:#f5f5f5;border:1.5px solid #ddd;border-radius:13px;color:#111;font-size:16px;outline:none;transition:border-color .2s,box-shadow .2s}
.fld input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,214,143,.12)}
.btn-main{width:100%;padding:15px;background:linear-gradient(135deg,var(--primary),var(--p2));color:#fff;border:none;border-radius:13px;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px;box-shadow:0 4px 20px rgba(0,214,143,.3);transition:opacity .15s}
.btn-main:active{opacity:.85}
.err{display:none;margin-top:12px;padding:10px 14px;background:rgba(255,82,82,.08);border:1px solid rgba(255,82,82,.2);border-radius:10px;color:#e00;font-size:13px;text-align:center}
.demo-link{margin-top:16px;color:var(--muted);font-size:12px;text-align:center;cursor:pointer;background:none;border:none;width:100%;text-decoration:underline;text-underline-offset:3px}

/* ══════ DEMO MODAL ══════ */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:600;align-items:flex-end;justify-content:center}
.mbg.on{display:flex}
.modal{background:var(--surf);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:72vh;display:flex;flex-direction:column;gap:12px}
.modal h3{font-size:16px;font-weight:700}
.modal p{color:var(--muted);font-size:12px}
.modal textarea{flex:1;min-height:180px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:12px;padding:12px;outline:none;resize:none;font-family:monospace}
.modal-btns{display:flex;gap:10px}
.btn-ghost{flex:1;padding:12px;background:#f0f0f0;border:1px solid #ccc;border-radius:12px;color:#555;font-size:14px;cursor:pointer}
.btn-acc{flex:2;padding:12px;background:var(--primary);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer}

/* ══════ HEADER ══════ */
.hdr{position:sticky;top:0;z-index:50;background:var(--surf);border-bottom:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;justify-content:space-between}
.hdr-l{display:flex;flex-direction:column}
.hdr-name{font-size:15px;font-weight:700}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:1px}
.av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--p2));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;cursor:pointer;flex-shrink:0}

/* ══════ CONTENT & NAV ══════ */
.content{overflow-y:auto;padding:14px;padding-bottom:calc(72px + env(safe-area-inset-bottom,0))}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surf);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0);z-index:50}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;padding:9px 2px 7px;border:none;background:none;color:var(--muted);font-size:10px;gap:3px;cursor:pointer;transition:color .2s}
.nb .ni{font-size:19px}
.nb.on{color:var(--primary)}

/* ══════ CARDS ══════ */
.card{background:var(--surf);border-radius:var(--r);border:1px solid var(--border);padding:16px;margin-bottom:12px}
.ctitle{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.card.hi{border-color:rgba(0,214,143,.35);background:linear-gradient(145deg,var(--surf),#0D1F18)}
.card.wa{border-color:rgba(246,181,74,.3)}
.card.da{border-color:rgba(255,82,82,.3)}

/* ══════ BADGE ══════ */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.badge.g{background:rgba(0,214,143,.12);color:var(--primary)}
.badge.y{background:rgba(246,181,74,.12);color:var(--warn)}
.badge.r{background:rgba(255,82,82,.12);color:var(--danger)}
.badge.b{background:rgba(91,155,245,.12);color:var(--blue)}

/* ══════ PROGRESS BAR ══════ */
.pbar{height:7px;background:var(--border);border-radius:4px;overflow:hidden}
.pfill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.pfill.g{background:linear-gradient(90deg,var(--primary),#5FFFC0)}
.pfill.y{background:linear-gradient(90deg,var(--warn),#FFD98F)}
.pfill.r{background:linear-gradient(90deg,var(--danger),#FF9090)}

/* ══════ RING CHART ══════ */
.ring-wrap{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.ring{width:90px;height:90px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  background:conic-gradient(var(--rc,var(--primary)) calc(var(--pct,0)*1%),var(--border) 0)}
.ring-in{width:70px;height:70px;border-radius:50%;background:var(--surf);display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-size:16px;font-weight:800}
.ring-lbl{font-size:9px;color:var(--muted);margin-top:1px}
.ring-right{flex:1}
.r-fat{font-size:26px;font-weight:800;letter-spacing:-1px}
.r-meta{font-size:12px;color:var(--muted);margin-top:3px}
.r-proj{font-size:12px;margin-top:5px}

/* ══════ KPI GRID ══════ */
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.kcard{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.klbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.kval{font-size:20px;font-weight:800;letter-spacing:-.5px;margin-top:5px}
.ksub{font-size:11px;color:var(--muted);margin-top:3px}

/* ══════ MINI-INFO ROW (3 cols) ══════ */
.irow{display:flex;gap:8px;margin-top:10px}
.icol{flex:1;background:var(--raised);border-radius:10px;padding:8px;text-align:center}
.icol-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.icol-val{font-size:15px;font-weight:800}

/* ══════ VERTICAL BAR CHART ══════ */
.vchart{display:flex;align-items:flex-end;gap:5px;height:100px}
.vc-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%}
.vc-bar{width:100%;border-radius:4px 4px 0 0;min-height:3px}
.vc-bar.act{background:linear-gradient(0deg,var(--primary),#5FFFC0)}
.vc-bar.done{background:var(--warn)}
.vc-val{font-size:8px;color:var(--text);font-weight:700;text-align:center;white-space:nowrap;line-height:1}
.vc-lbl{font-size:9px;color:var(--muted)}

/* ══════ HORIZONTAL BAR ROWS ══════ */
.hrow{padding:10px 0;border-bottom:1px solid var(--border)}
.hrow:last-child{border-bottom:none}
.hrow-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;gap:8px}
.hrow-left{min-width:0;flex:1}
.hrow-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hrow-sub{font-size:11px;color:var(--muted);margin-top:2px}
.hrow-right{text-align:right;flex-shrink:0}
.hrow-val{font-size:13px;font-weight:700}
.hrow-2nd{font-size:10px;color:var(--muted)}
.hbar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.hbar-f{height:100%;border-radius:3px;transition:width .6s ease}

/* ══════ RANK BADGE ══════ */
.rnk{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.rnk.r1{background:rgba(246,181,74,.2);color:var(--warn)}
.rnk.r2{background:rgba(192,192,192,.15);color:#9CA3AF}
.rnk.r3{background:rgba(180,83,9,.15);color:#CD7F32}
.rnk.rn{background:var(--raised);color:var(--muted)}

/* ══════ TREND ══════ */
.tr-up{color:var(--primary);font-size:11px;font-weight:700}
.tr-dn{color:var(--danger);font-size:11px;font-weight:700}
.tr-fl{color:var(--muted);font-size:11px}

/* ══════ MONTH CARD (Mensal tab) ══════ */
.mcard{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.mcard.cur{border-color:rgba(0,214,143,.4);background:linear-gradient(145deg,#141926,#0D1F18)}
.mcard-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.mcard-title{font-size:15px;font-weight:700}
.mcard-fat{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.mcard-meta{font-size:12px;color:var(--muted);margin-bottom:10px}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.pill{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;background:var(--raised);color:var(--muted)}

/* ══════ COMPARE TABLE ══════ */
.ctab{width:100%;border-collapse:collapse;font-size:12px}
.ctab th{text-align:center;padding:6px 4px;color:var(--muted);font-weight:700;font-size:11px;border-bottom:1px solid var(--border)}
.ctab th:first-child{text-align:left}
.ctab td{padding:7px 4px;text-align:center;border-bottom:1px solid var(--border)}
.ctab td:first-child{text-align:left;font-weight:600}
.ctab tr.total td{font-weight:800;border-top:2px solid var(--border);border-bottom:none}
.pos{color:var(--primary)}.neg{color:var(--danger)}

/* ══════ PROJ TAB ══════ */
.prow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.prow:last-child{border-bottom:none}
.plabel{font-size:13px;color:var(--muted)}
.pval{font-size:13px;font-weight:700}
.proj3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.p3col{background:var(--raised);border-radius:12px;padding:10px;text-align:center}
.p3lbl{font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.p3val{font-size:16px;font-weight:800}
.p3sub{font-size:9px;color:var(--muted);margin-top:2px}

/* ══════ FILTER BUTTONS ══════ */
.filters{display:flex;gap:7px;margin-bottom:12px}
.fbtn{flex:1;padding:9px 6px;border-radius:10px;border:1.5px solid var(--border);background:var(--surf);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;transition:all .2s}
.fbtn.on{border-color:var(--primary);background:rgba(0,214,143,.1);color:var(--primary)}
.fbtn.on-r{border-color:var(--danger);background:rgba(255,82,82,.1);color:var(--danger)}

/* ══════ SCROLLBAR ══════ */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ══════ ALERT BOX ══════ */
.abox{border-radius:12px;padding:11px 14px;border:1px solid}
.abox.g{background:rgba(0,214,143,.07);border-color:rgba(0,214,143,.25)}
.abox.y{background:rgba(246,181,74,.07);border-color:rgba(246,181,74,.25)}
.abox.r{background:rgba(255,82,82,.07);border-color:rgba(255,82,82,.25)}
.abox-t{font-size:12px;font-weight:700;margin-bottom:4px}
.abox-d{font-size:12px;color:var(--muted);line-height:1.5}
</style>

<style id="demo-style">
/* Picker de vendedores */
#demo-vend-picker { display: none; width: 100%; }
#demo-vend-picker .dvp-title {
  font-size: 13px; font-weight: 700; text-align: center;
  margin-bottom: 16px; color: #333; letter-spacing: .2px;
}
#demo-vend-picker .btn-vend {
  width: 100%; padding: 14px 16px;
  background: linear-gradient(135deg, #5B9BF5, #3a7bd5);
  color: #fff; border: none; border-radius: 13px;
  font-size: 15px; font-weight: 700; cursor: pointer;
  margin-bottom: 10px; text-align: left;
  box-shadow: 0 4px 16px rgba(91,155,245,.3);
  transition: opacity .15s;
}
#demo-vend-picker .btn-vend:active { opacity: .85; }
#demo-vend-picker .btn-vend span {
  font-size: 11px; font-weight: 400; opacity: .8;
  display: block; margin-top: 2px;
}
</style>
</head>

// Helpers de mês
const MONTH_ORDER = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
function prevMonthKey(m) {
  const i = MONTH_ORDER.indexOf(m.toLowerCase());
  return i > 0 ? MONTH_ORDER[i-1] : null;
}
// Acessa faturamento do mês atual do cliente (compatível com JSON e TXT)
function cFat(c)  { return c.curFat  !== undefined ? c.curFat  : (c[D.curMonth.toLowerCase()]||0); }
function cPrev(c) { return c.prevFat !== undefined ? c.prevFat : (c[prevMonthKey(D.curMonth)]||0); }
// Faturamento mês atual de categoria
function catCur(c) { return c.curFat !== undefined ? c.curFat : (c.mai||0); }

// ── Seletor de perfil ──────────────────────────────────────────────────────
function showMode(mode) {
  document.getElementById('mode-sel').style.display  = mode ? 'none' : 'flex';
  document.getElementById('form-dir').style.display  = mode === 'dir'  ? 'block' : 'none';
  document.getElementById('form-vend').style.display = mode === 'vend' ? 'block' : 'none';
  document.getElementById('err').style.display = 'none';
  if (mode === 'dir')  { document.getElementById('du').focus(); }
  if (mode === 'vend') { document.getElementById('ic').focus(); }
}

// ── Login Vendedor ──────────────────────────────────────────────────────────
function doLogin() {
  const code = document.getElementById('ic').value.trim();
  const pass = document.getElementById('ip').value;
  document.getElementById('err').style.display = 'none';

  if (!code) { showErr('Informe o código e a senha.'); return; }

  const data = VENDORS_DATA[code];
  if (!data) { showErr('Operador não encontrado.'); return; }

  const senhaCorreta = data.senha || (code + '@');
  if (pass !== senhaCorreta) { showErr('Senha incorreta.'); return; }

  bootData(data);
}

function logout() {
  D = null;
  document.getElementById('ic').value = '';
  document.getElementById('ip').value = '';
  showMode(null);
  goScreen('login');
}

// ── Login Diretoria ─────────────────────────────────────────────────────────
const DIR_LOGINS = {"demo":"demo123"}; /* DEMO */

function doLoginDir() {
  const user = document.getElementById('du').value.trim().toLowerCase();
  const pass = document.getElementById('dp').value;
  document.getElementById('err').style.display = 'none';

  if (!DIR_LOGINS[user] || pass !== DIR_LOGINS[user]) {
    showErr('Usuário ou senha incorretos.');
    return;
  }
  bootDir(user);
}

function logoutDir() {
  showMode(null);
  goScreen('login');
}

function bootDir(user) {
  const nm = user.charAt(0).toUpperCase() + user.slice(1);
  document.getElementById('d-name').textContent = nm;
  document.getElementById('d-sub').textContent  = 'Diretoria · ' + (DIRECTOR_DATA.curMonth||'') + '/2026';
  goScreen('dir-app');
  goTabDir('geral', document.getElementById('dnb-geral'));
}

function showErr(m) {
  const e = document.getElementById('err');
  e.textContent = m;
  e.style.display = 'block';
}

// ║  BOOT                                    ║

function bootData(data) {
  D = data;
  document.getElementById('h-name').textContent = D.name;
  document.getElementById('h-sub').textContent  = `Cód ${D.code} · Jan–${D.curMonth}/2026`;
  const av = document.getElementById('h-av'); if(av) av.textContent = (D.name||'?')[0].toUpperCase();
  renderAll();
  goScreen('app');
  goTab('inicio', document.querySelector('.nb.on'));
}

function pr(s) { if(!s)return 0; return parseFloat(s.replace(/\./g,'').replace(',','.'))||0; }
function fk(v) {
  if(!v) return 'R$0';
  if(v>=1e6) return 'R$'+(v/1e6).toFixed(2).replace('.',',')+'M';
  if(v>=1e3) return 'R$'+Math.round(v/1e3)+'k';
  return 'R$'+v.toFixed(0);
}
function ff(v) { return 'R$'+(v||0).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function cap(s) { return s?s.charAt(0).toUpperCase()+s.slice(1).toLowerCase():s; }
function pcls(p) { return p>=100?'g':p>=65?'y':'r'; }
function mcls(m) { return m>24?'g':m>=22?'y':'r'; }
function mcol(m) { return m>24?'var(--primary)':m>=22?'var(--warn)':'var(--danger)'; }

}

      <div class="ctitle">👥 Top Clientes — ${D.curMonth}</div>
      ${cliHtml}
    </div>`:''}

    ${topCat.length?`
    <!-- Top Categorias -->
    <div class="card">
      <div class="ctitle">📦 Top Categorias — ${D.curMonth}</div>
      ${catHtml}
    </div>`:''}
  `;
}

// ══════════════════════════════════════
// DEVOLUÇÕES VENDEDOR (início)
// ══════════════════════════════════════
let vendDevExpanded = null;

function buildVendDevCard() {
  const devMeses = D.m26.filter(m=>m.dev>0);
  if (!devMeses.length) return '';
  const totDev = D.m26.reduce((s,m)=>s+(m.dev||0),0);
  const maxDev = Math.max(...devMeses.map(m=>m.dev),1);

  const devRows = D.m26.filter(m=>m.dev>0).map(m=>{
    const pct   = (m.dev/maxDev*100).toFixed(0);
    const isCur = m.month===D.curMonth;
    const isExp = vendDevExpanded === m.month;
    const clis  = (D.devClients && D.devClients[m.month]) || [];
    const drill = isExp && clis.length ? `
      <div style="margin-top:8px;padding:8px;background:var(--raised);border-radius:8px">
        <div style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Clientes com devolução</div>
        ${clis.map(c=>`
          <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px">
            <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)">${c.name}</span>
            <span style="font-weight:700;color:var(--danger);margin-left:8px;flex-shrink:0">${ff(c.dev)}</span>
          </div>`).join('')}
      </div>` : '';
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
        <div style="font-size:11px;font-weight:600;color:${isCur?'var(--primary)':'var(--text)'}">${m.month}</div>
        <div style="font-size:11px;font-weight:700;color:var(--danger)">${ff(m.dev)}</div>
      </div>
      <div class="pbar"><div class="pfill r" style="width:${pct}%"></div></div>
      <div style="font-size:10px;color:var(--muted);margin-top:2px">${m.fat>0?(m.dev/m.fat*100).toFixed(1)+'% do faturamento':''}</div>
      <div onclick="toggleVendDev('${m.month}')" style="margin-top:5px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--primary);padding:3px 8px;border:1px solid var(--primary);border-radius:20px;opacity:.8">
        ${isExp?'▲ Fechar':'▼ Clique e veja os clientes'}
      </div>
      ${drill}
    </div>`;
  }).join('');

  return `<div class="card">
    <div class="ctitle">↩️ Devoluções por Mês</div>
    ${devRows}
  </div>`;
}

window.toggleVendDev = function(month) {
  vendDevExpanded = vendDevExpanded === month ? null : month;
  const el = document.getElementById('vend-dev-card');
  if (el) el.innerHTML = buildVendDevCard();
};

function renderMensal() {
  const MN = {Jan:'Janeiro',Fev:'Fevereiro',Mar:'Março',Abr:'Abril',Mai:'Maio',Jun:'Junho',Jul:'Julho',Ago:'Agosto',Set:'Setembro',Out:'Outubro',Nov:'Novembro',Dez:'Dezembro'};

  const cards = D.m26.map(m=>{
    const pct = m.meta>0?m.fat/m.meta*100:0;
    const cls = pcls(pct);
    const cur = m.month===D.curMonth;
    return `
    <div class="mcard ${cur?'cur':''}">
      <div class="mcard-head">
        <div>
          <div class="mcard-title">${MN[m.month]||m.month} 2026 ${cur?'<span style="font-size:11px;color:var(--primary)"> • atual</span>':''}</div>
        </div>
        <span class="badge ${cls}">${pct.toFixed(1)}%</span>
      </div>
      <div class="mcard-fat" style="color:${cls==='g'?'var(--primary)':cls==='y'?'var(--warn)':'var(--danger)'}">${ff(m.fat)}</div>
      <div class="mcard-meta">Meta: ${ff(m.meta)}${cur?' · Projeção: '+ff(m.proj):''}</div>
      <div class="pbar"><div class="pfill ${cls}" style="width:${Math.min(pct,100).toFixed(1)}%"></div></div>
      <div class="pills">
        <span class="pill" style="color:${mcol(m.mg)}">Mg ${m.mg.toFixed(1)}%</span>
        <span class="pill" style="color:var(--danger)">Dev ${ff(m.dev)}</span>
        <span class="pill" style="color:var(--blue)">Méd/dia ${fk(m.medDia)}</span>
        ${m.dev&&m.fat>0?`<span class="pill" style="color:var(--warn)">Dev% ${(m.dev/m.fat*100).toFixed(1)}%</span>`:''}
      </div>
    </div>`;
  }).join('');

  // Totals row
  const tMeta = D.m26.reduce((s,m)=>s+m.meta,0);
  const tFat  = D.m26.reduce((s,m)=>s+m.fat,0);
  const tDev  = D.m26.reduce((s,m)=>s+(m.dev||0),0);
  const tPct  = tMeta>0?tFat/tMeta*100:0;

  // ── Tabela comparativa 2025 × 2026 ──
  const MONTHS_ORDER = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  let cmRows = '', tot25=0, tot26=0, totMg25=0, totMg26=0, wtMg25=0, wtMg26=0;

  MONTHS_ORDER.forEach(mon=>{
    const r26 = D.m26.find(m=>m.month===mon);
    const r25 = D.m25.find(m=>m.month===mon);
    if (!r26 && !r25) return;
    const f26 = r26 ? r26.fat : null;
    const f25 = r25 ? r25.fat : null;
    const g26 = r26 ? r26.mg  : null;
    const g25 = r25 ? r25.mg  : null;
    if (f25) { tot25 += f25; wtMg25 += f25 * (g25||0); }
    if (f26) { tot26 += f26; wtMg26 += f26 * (g26||0); }
    const isCur = mon===D.curMonth;
    const vf = f25&&f26 ? ((f26-f25)/f25*100) : null;
    const vm = g25&&g26 ? (g26-g25)           : null;
    cmRows += `<tr${isCur?' style="background:rgba(0,214,143,.05)"':''}>
      <td><strong>${mon}</strong>${isCur?' <span style="color:var(--primary);font-size:10px">●</span>':''}</td>
      <td>${f25?fk(f25):'—'}</td>
      <td style="color:${g25?mcol(g25):'inherit'}">${g25!==null?g25.toFixed(1)+'%':'—'}</td>
      <td style="color:${f26?(f25&&f26>=f25?'var(--primary)':'var(--danger)'):'inherit'}">${f26?fk(f26)+(isCur?'*':''):'—'}</td>
      <td style="color:${g26?mcol(g26):'inherit'}">${g26!==null?g26.toFixed(1)+'%':'—'}</td>
      <td class="${vf!==null?(vf>=0?'pos':'neg'):''}">${vf!==null?(vf>=0?'+':'')+vf.toFixed(0)+'%':'—'}</td>
      <td class="${vm!==null?(vm>=0?'pos':'neg'):''}">${vm!==null?(vm>=0?'+':'')+vm.toFixed(1)+'pp':'—'}</td>
    </tr>`;
  });

  const vtot  = tot25>0?((tot26-tot25)/tot25*100):null;
  const mg25a = tot25>0?(wtMg25/tot25):0;
  const mg26a = tot26>0?(wtMg26/tot26):0;
  const vmga  = mg25a&&mg26a ? (mg26a-mg25a) : null;

  document.getElementById('t-mensal').innerHTML = `
    ${cards}

    <!-- Resumo acumulado -->
    <div class="card">
      <div class="ctitle">📊 Resumo Acumulado 2026</div>
      <div class="prow"><span class="plabel">Total Faturado</span><span class="pval" style="color:var(--primary)">${ff(tFat)}</span></div>
      <div class="prow"><span class="plabel">Total Meta</span><span class="pval">${ff(tMeta)}</span></div>
      <div class="prow"><span class="plabel">Atingimento</span><span class="pval"><span class="badge ${pcls(tPct)}">${tPct.toFixed(1)}%</span></span></div>
      <div class="prow"><span class="plabel">Total Devoluções</span><span class="pval" style="color:var(--danger)">${ff(tDev)}</span></div>
      <div class="prow"><span class="plabel">Dev % s/ Faturado</span><span class="pval" style="color:var(--warn)">${tFat>0?(tDev/tFat*100).toFixed(1)+'%':'—'}</span></div>
    </div>

    ${D.m25.length?`
    <!-- 2025 x 2026 TABELA COMPLETA -->
    <div class="card">
      <div class="ctitle">🔄 Comparativo 2025 × 2026</div>
      <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
      <table class="ctab" style="min-width:380px">
        <thead>
          <tr>
            <th rowspan="2" style="text-align:left">Mês</th>
            <th colspan="2" style="border-bottom:1px solid var(--border);color:var(--muted)">2025</th>
            <th colspan="2" style="border-bottom:1px solid var(--border);color:var(--primary)">2026</th>
            <th colspan="2" style="border-bottom:1px solid var(--border)">Variação</th>
          </tr>
          <tr>
            <th>Fat.</th><th>Mg%</th>
            <th style="color:var(--primary)">Fat.</th><th style="color:var(--primary)">Mg%</th>
            <th>Fat%</th><th>Mg</th>
          </tr>
        </thead>
        <tbody>${cmRows}</tbody>
        <tfoot>
          <tr class="total">
            <td>Total</td>
            <td>${fk(tot25)}</td>
            <td style="color:${mcol(mg25a)}">${mg25a.toFixed(1)}%</td>
            <td style="color:var(--primary)">${fk(tot26)}</td>
            <td style="color:${mcol(mg26a)}">${mg26a.toFixed(1)}%</td>
            <td class="${vtot!==null?(vtot>=0?'pos':'neg'):''}">${vtot!==null?(vtot>=0?'+':'')+vtot.toFixed(1)+'%':'—'}</td>
            <td class="${vmga!==null?(vmga>=0?'pos':'neg'):''}">${vmga!==null?(vmga>=0?'+':'')+vmga.toFixed(1)+'pp':'—'}</td>
          </tr>
        </tfoot>
      </table>
      </div>
      <p style="font-size:10px;color:var(--muted);margin-top:8px">* Mês atual: projetado para ${D.daysTotal} dias · pp = pontos percentuais de margem</p>
    </div>`:''
  }`;
}

// TAB 3 — CLIENTES
// ══════════════════════════════════════
function renderClientes() {
  const doRender = () => {
    const mKeys = D.m26.map(m=>m.month.toLowerCase());
    const curKey = D.curMonth.toLowerCase();
    const gapN  = D.clients.filter(c =>
      (c[curKey]||0)===0 && mKeys.some(mk=>(c[mk]||0)>0)
    ).length;

    let list = [...D.clients].sort((a,b)=>cFat(b)-cFat(a));
    if (clientFilter==='gap') list = list.filter(c =>
      (c[curKey]||0)===0 && mKeys.some(mk=>(c[mk]||0)>0)
    );

    const maxM = Math.max(...list.map(c=>cFat(c)),1);

    const rows = list.map((c,i)=>{
      const rk = i===0?'r1':i===1?'r2':i===2?'r3':'rn';
      const cf = cFat(c), cp = cPrev(c);
      const inativo = cf===0;
      const missMes = mKeys.filter(mk=>(c[mk]||0)===0&&mKeys.some(m2=>(c[m2]||0)>0));
      const vals = mKeys.map(mk=>c[mk]||0);
      const maxV = Math.max(...vals,1);
      const W=280, H=44, pad=4;
      const pts = vals.map((v,i)=>{
        const x = pad + i*(W-pad*2)/(Math.max(vals.length-1,1));
        const y = H - pad - (v/maxV)*(H-pad*2);
        return [x,y];
      });
      const polyline = pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
      const dots = pts.map(([x,y],i)=>{
        const mk = mKeys[i];
        const v  = vals[i];
        const isCur = mk===curKey;
        const col = v===0?'#FF5252':isCur?'var(--primary)':'var(--warn)';
        return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${isCur?4:3}" fill="${col}" stroke="var(--surf)" stroke-width="1.5"/>
          <text x="${x.toFixed(1)}" y="${(y-7).toFixed(1)}" text-anchor="middle" font-size="7" fill="${col}" font-weight="700">${v>0?fk(v):''}</text>
          <text x="${x.toFixed(1)}" y="${(H+1).toFixed(1)}" text-anchor="middle" font-size="7" fill="${isCur?'var(--primary)':'rgba(255,255,255,.4)'}">${mk.charAt(0).toUpperCase()+mk.slice(1)}</text>`;
      }).join('');
      const tabelaMeses = `<svg viewBox="0 0 ${W} ${H+10}" style="width:100%;overflow:visible">
        <polyline points="${polyline}" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="1.5"/>
        ${dots}
      </svg>`;
      return `
      <div class="hrow">
        <div class="hrow-top">
          <div style="display:flex;align-items:flex-start;gap:8px;min-width:0">
            <div class="rnk ${rk}" style="margin-top:2px">${i+1}</div>
            <div class="hrow-left">
              <div class="hrow-name">${c.name}</div>
              <div class="hrow-sub">${c.city?c.city+' · ':''}Mg <span style="color:${mcol(c.mg)};font-weight:700">${c.mg.toFixed(1)}%</span>${c.dev>0?` · Dev <span style="color:var(--danger);font-weight:700">${ff(c.dev)}</span>`:''}
                ${inativo?'<span class="badge r" style="margin-left:4px">Inativo</span>':''}
                ${!inativo&&missMes.length?`<span class="badge r" style="margin-left:4px">Sem: ${missMes.map(m=>m.charAt(0).toUpperCase()+m.slice(1)).join(', ')}</span>`:''}
              </div>
            </div>
          </div>
          <div class="hrow-right">
            <div class="hrow-val" style="color:${inativo?'var(--muted)':'var(--primary)'}">
              ${inativo?'—':ff(cf)}
            </div>
          </div>
        </div>
        <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
          ${tabelaMeses}
        </div>
      </div>`;
    }).join('') || '<p style="color:var(--muted);padding:20px;text-align:center">Nenhum cliente</p>';

    document.getElementById('t-clientes').innerHTML = `
      <div class="filters">
        <button class="fbtn ${clientFilter==='all'?'on':''}" onclick="setCliFilter('all')">Todos (${D.clients.length})</button>
        <button class="fbtn ${clientFilter==='gap'?'on-r':''}" onclick="setCliFilter('gap')" style="${clientFilter==='gap'?'border-color:var(--warn);background:rgba(255,171,0,.1);color:var(--warn)':''}">Sem compra em ${D.curMonth} (${gapN})</button>
      </div>
      <div class="card">${rows}</div>
    `;
  };
  window.setCliFilter = f => { clientFilter=f; doRender(); };
  doRender();
}

function renderCats() {

  const maxTot  = Math.max(...sorted.map(c=>c.total),1);

  const rows = sorted.map((c,i)=>{
    const rk = i===0?'r1':i===1?'r2':i===2?'r3':'rn';

          <div class="rnk ${rk}">${i+1}</div>

            <div class="hrow-name">${c.name}</div>

        <div class="hrow-right">
          <div class="hrow-val" style="color:var(--primary)">${fk(c.total)}</div>
          <div class="hrow-2nd">${D.curMonth}: ${fk(catCur(c))}</div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:3px">
        <div class="hbar"><div class="hbar-f" style="width:${barTot}%;background:${mcol(c.mg)}"></div></div>
        <div class="hbar" style="height:3px"><div class="hbar-f" style="width:${barMai}%;background:rgba(91,155,245,.55)"></div></div>

  }).join('');

  document.getElementById('t-cats').innerHTML = `
    <div class="kgrid" style="margin-bottom:12px">
      <div class="kcard">
        <div class="klbl">Acumulado 2026</div>
        <div class="kval" style="color:var(--primary)">${fk(totAll)}</div>
        <div class="ksub">${sorted.length} categorias</div>
      </div>
      <div class="kcard">
        <div class="klbl">${D.curMonth} (top cats)</div>
        <div class="kval" style="color:var(--blue)">${fk(maiAll)}</div>
        <div class="ksub">mês atual</div>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;gap:16px;margin-bottom:10px;font-size:10px;color:var(--muted)">
        <span>▬ Acumulado</span>
        <span style="color:rgba(91,155,245,.7)">▬ ${D.curMonth}</span>
      </div>
      ${rows}
    </div>
  `;
}

// ══════════════════════════════════════
// TAB 5 — PROJEÇÃO
// ══════════════════════════════════════
function renderDash() {
  const tot26    = D.m26.reduce((s,m)=>s+m.fat,0);
  const totMeta  = D.m26.reduce((s,m)=>s+m.meta,0);
  const ating    = totMeta>0 ? tot26/totMeta*100 : 0;
  const totDev   = D.m26.reduce((s,m)=>s+(m.dev||0),0);
  const cur      = D.m26.find(m=>m.month===D.curMonth)||{};
  const mgMedia  = tot26>0 ? D.m26.reduce((s,m)=>s+m.fat*(m.mg||0),0)/tot26 : 0;

  const done  = D.m26.filter(m=>m.month!==D.curMonth);
  const tDone = done.reduce((s,m)=>s+m.fat,0);
  const avgM  = done.length>0 ? tDone/done.length : 0;
  const projA = tDone+(cur.proj||cur.fat||0)+avgM*Math.max(12-D.m26.length,0);

  const matched25 = D.m25.filter(m25=>D.m26.find(m26=>m26.month===m25.month));
  const tot25     = matched25.reduce((s,m)=>s+m.fat,0);
  const var2526   = tot25>0 ? ((tot26-tot25)/tot25*100) : null;

  // ── Gráfico evolução 2026 ─────────────────────────────────────────────────
  const maxBar = Math.max(...D.m26.map(m=>Math.max(m.fat,m.meta||0)),1);
  const bars2026 = D.m26.map(m=>{
    const isCur = m.month===D.curMonth;
    const hFat  = Math.round(m.fat/maxBar*90);
    const hMeta = Math.round((m.meta||0)/maxBar*90);
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:1px">
      <div style="font-size:8px;color:${isCur?'var(--primary)':'var(--warn)'};font-weight:700;white-space:nowrap">${fk(m.fat)}</div>
      <div style="position:relative;width:100%;display:flex;align-items:flex-end;height:90px">
        <div style="width:100%;height:${hFat}px;background:${isCur?'var(--primary)':'var(--warn)'};border-radius:3px 3px 0 0;display:flex;align-items:flex-start;justify-content:center;padding-top:3px;overflow:hidden">
          ${hFat>16?`<span style="font-size:7px;font-weight:700;color:#000;white-space:nowrap">${fk(m.meta||0)}</span>`:''}
        </div>
        <div style="position:absolute;bottom:${hMeta}px;left:0;right:0;height:2px;background:rgba(255,255,255,.45);border-radius:2px"></div>
      </div>
      <div style="font-size:9px;color:${isCur?'var(--primary)':'var(--muted)'};font-weight:${isCur?'700':'400'}">${m.month}</div>
    </div>`;
  }).join('');

  // ── Comparativo 2025 vs 2026 ──────────────────────────────────────────────
  const max2526 = Math.max(...D.m26.map(m=>m.fat),...D.m25.filter(m=>D.m26.find(x=>x.month===m.month)).map(m=>m.fat),1);
  const bars2526 = D.m26.map(m=>{
    const m25  = D.m25.find(x=>x.month===m.month)||{fat:0};
    const h26  = Math.round(m.fat/max2526*70);
    const h25  = Math.round(m25.fat/max2526*70);
    const isCur = m.month===D.curMonth;
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:1px">
      <div style="display:flex;gap:2px;width:100%">
        <div style="flex:1;font-size:7px;color:rgba(91,155,245,.9);text-align:center;font-weight:600;white-space:nowrap;overflow:hidden">${fk(m25.fat)}</div>
        <div style="flex:1;font-size:7px;color:${isCur?'var(--primary)':'var(--warn)'};text-align:center;font-weight:600;white-space:nowrap;overflow:hidden">${fk(m.fat)}</div>
      </div>
      <div style="width:100%;display:flex;align-items:flex-end;gap:1px;height:70px">
        <div style="flex:1;height:${h25}px;background:rgba(91,155,245,.5);border-radius:2px 2px 0 0"></div>
        <div style="flex:1;height:${h26}px;background:${isCur?'var(--primary)':'var(--warn)'};border-radius:2px 2px 0 0"></div>
      </div>
      <div style="font-size:8px;color:${isCur?'var(--primary)':'var(--muted)'};font-weight:${isCur?'700':'400'}">${m.month}</div>
    </div>`;
  }).join('');

  // ── Donut categorias ──────────────────────────────────────────────────────
  const COLORS = ['#00D68F','#5B9BF5','#F6B54A','#FF5252','#C084FC','#38BDF8','#FB923C','#A3E635','#E879F9','#FCD34D','#64748b'];
  const topCats   = [...D.cats].sort((a,b)=>b.total-a.total).slice(0,10);
  const totalCats = D.cats.reduce((s,c)=>s+c.total,0);
  const otherTot  = totalCats-topCats.reduce((s,c)=>s+c.total,0);
  const donutList = [...topCats,...(otherTot>0?[{name:'Outros',total:otherTot,mg:0}]:[])];
  let acc=0;
  const segs = donutList.map((c,i)=>{
    const pct=totalCats>0?c.total/totalCats*100:0;
    const s={pct,color:COLORS[i]||'#64748b',start:acc}; acc+=pct; return s;
  });
  const donutGrad = segs.map(s=>`${s.color} ${s.start.toFixed(1)}% ${(s.start+s.pct).toFixed(1)}%`).join(',');
  const catLegend = donutList.map((c,i)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">
      <div style="width:10px;height:10px;border-radius:50%;background:${COLORS[i]};flex-shrink:0"></div>
      <div style="flex:1;font-size:11px;font-weight:600;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.name}</div>
      <div style="font-size:11px;color:var(--muted)">${totalCats>0?(c.total/totalCats*100).toFixed(1):0}%</div>
      <div style="font-size:11px;font-weight:700;color:var(--primary)">${fk(c.total)}</div>
    </div>`).join('');

  // ── Top 10 clientes ───────────────────────────────────────────────────────
  const top10 = [...D.clients].sort((a,b)=>cFat(b)-cFat(a)).slice(0,10);
  const maxCli = Math.max(...top10.map(c=>cFat(c)),1);
  const cliRows = top10.map((c,i)=>`
    <div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px">
        <div style="font-size:11px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${i+1}. ${c.name}</div>
        <div style="font-size:11px;font-weight:700;color:var(--primary);margin-left:8px">${ff(cFat(c))}</div>
      </div>
      <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${(cFat(c)/maxCli*100).toFixed(0)}%;background:${mcol(c.mg)};border-radius:3px;transition:width .6s ease"></div>
      </div>
      <div style="font-size:10px;color:var(--muted);margin-top:2px">Mg <span style="color:${mcol(c.mg)};font-weight:700">${c.mg.toFixed(1)}%</span>${c.dev>0?` · Dev ${fk(c.dev)}`:''}${c.city?' · '+c.city:''}</div>
    </div>`).join('');

  document.getElementById('t-dash').innerHTML = `
    <div class="card">
      <div class="ctitle">📊 Panorama — Jan–${D.curMonth}/2026</div>
      <div class="kgrid">
        <div class="kcard">
          <div class="klbl">Fat. Acumulado</div>
          <div class="kval" style="color:var(--primary)">${fk(tot26)}</div>
          <div class="ksub">Jan–${D.curMonth}</div>
        </div>
        <div class="kcard">
          <div class="klbl">Atingimento</div>
          <div class="kval"><span class="badge ${pcls(ating)}">${ating.toFixed(1)}%</span></div>
          <div class="ksub">meta ${fk(totMeta)}</div>
        </div>

        <div class="kcard">
          <div class="klbl">Devolução Total</div>
          <div class="kval" style="color:var(--danger)">${fk(totDev)}</div>
          <div class="ksub">${tot26>0?(totDev/tot26*100).toFixed(1)+'% do fat.':''}</div>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:10px">
        <div class="kcard" style="flex:1;text-align:center">
          <div class="klbl">Projeção Anual</div>
          <div class="kval" style="color:var(--primary)">${fk(projA)}</div>
        </div>
        ${var2526!==null?`<div class="kcard" style="flex:1;text-align:center">
          <div class="klbl">vs 2025</div>
          <div class="kval"><span class="badge ${var2526>=0?'g':'r'}">${var2526>=0?'▲ +':'▼ '}${Math.abs(var2526).toFixed(1)}%</span></div>
        </div>`:''}
      </div>
    </div>

    <div class="card">
      <div class="ctitle">📈 Evolução Mensal 2026</div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:8px;display:flex;gap:12px;flex-wrap:wrap">
        <span><span style="display:inline-block;width:8px;height:8px;background:var(--primary);border-radius:2px;margin-right:3px"></span>Mês atual</span>
        <span><span style="display:inline-block;width:8px;height:8px;background:var(--warn);border-radius:2px;margin-right:3px"></span>Anteriores</span>
        <span><span style="display:inline-block;width:20px;height:2px;background:rgba(255,255,255,.45);border-radius:2px;margin-right:3px;vertical-align:middle"></span>Meta</span>
      </div>
      <div style="display:flex;align-items:flex-end;gap:4px;height:112px">${bars2026}</div>
    </div>

    ${D.m25.length?`<div class="card">
      <div class="ctitle">🔄 Comparativo 2025 vs 2026</div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:8px;display:flex;gap:12px">
        <span><span style="display:inline-block;width:8px;height:8px;background:rgba(91,155,245,.5);border-radius:2px;margin-right:3px"></span>2025</span>
        <span><span style="display:inline-block;width:8px;height:8px;background:var(--primary);border-radius:2px;margin-right:3px"></span>2026</span>
      </div>
      <div style="display:flex;align-items:flex-end;gap:3px;height:86px">${bars2526}</div>
    </div>`:''}

    <div class="card">
      <div class="ctitle">📦 Distribuição por Categoria</div>
      <div style="display:flex;align-items:center;gap:16px">
        <div style="width:90px;height:90px;border-radius:50%;background:conic-gradient(${donutGrad});flex-shrink:0;position:relative">
          <div style="position:absolute;inset:18px;border-radius:50%;background:var(--surf)"></div>
        </div>
        <div style="flex:1;min-width:0">${catLegend}</div>
      </div>
    </div>

    <div class="card">
      <div class="ctitle">👥 Top 10 Clientes — ${D.curMonth}</div>
      ${cliRows}
    </div>
  `;
}

const TABS = ['inicio','mensal','clientes','cats','dash'];

function goTab(tab, btn) {
  TABS.forEach(t => {
    document.getElementById('t-'+t).style.display = t===tab ? 'block' : 'none';
  });
  if (btn) {
    document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
  }
}

function goScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function ov(v) { document.getElementById('ov').classList.toggle('on',v); }

const DIR_TABS = ['geral','vend','metacat','cid','cli'];
let dirVendExpanded = null;

// ╔══════════════════════════════════════════╗
// ║  DIRETORIA — MENU 1: VISÃO GERAL         ║
// ╚══════════════════════════════════════════╝
function renderDirGeral() {
  const DD = DIRECTOR_DATA;
  if (!DD || !DD.m26 || !DD.m26.length) {
    document.getElementById('dt-geral').innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px">Sem dados</p>';
    return;
  }
  const cur     = DD.m26[DD.m26.length-1];
  const totFat  = DD.m26.reduce((s,m)=>s+m.fat,0);
  const totMeta = DD.m26.reduce((s,m)=>s+m.meta,0);
  const totDev  = DD.m26.reduce((s,m)=>s+(m.dev||0),0);
  const ating   = totMeta>0 ? totFat/totMeta*100 : 0;
  const mgMedia = totFat>0 ? DD.m26.reduce((s,m)=>s+m.fat*(m.mg||0),0)/totFat : 0;
  const meses26 = new Set(DD.m26.map(m=>m.month));
  const tot25   = DD.m25 ? DD.m25.filter(m=>meses26.has(m.month)).reduce((s,m)=>s+m.fat,0) : 0;
  const var2526 = tot25>0 ? ((totFat-tot25)/tot25*100) : null;

  // ── KPIs ──────────────────────────────────────────────────────────────────
  const curPct  = cur.meta>0 ? Math.min(cur.fat/cur.meta*100, 100) : 0;
  const ringCol  = '#F6B54A';
  const ringGrad = `conic-gradient(#F6B54A ${curPct.toFixed(1)}%, var(--border) 0)`;
  const kpis = `
  <div class="card">
    <div class="ctitle">📊 Consolidado Jan–${cur.month}/2026</div>

    <!-- Meta x Faturamento (anel) -->
    <div style="display:flex;align-items:center;gap:18px;padding:14px;background:var(--raised);border-radius:12px;margin-bottom:12px">
      <div style="position:relative;width:96px;height:96px;border-radius:50%;background:${ringGrad};flex-shrink:0">
        <div style="position:absolute;inset:14px;border-radius:50%;background:var(--surf);display:flex;align-items:center;justify-content:center">
          <span style="font-size:13px;font-weight:800;color:${ringCol}">${curPct.toFixed(0)}%</span>
        </div>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:700;margin-bottom:8px">Meta ${cur.month} × Faturamento</div>
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
          <span style="color:var(--muted)">Meta</span>
          <span style="font-weight:700;color:#00D68F">${ff(cur.meta||0)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
          <span style="color:var(--muted)">Fat. atual</span>
          <span style="font-weight:700;color:#F6B54A">${ff(cur.fat||0)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:12px">
          <span style="color:var(--muted)">Gap</span>
          <span style="font-weight:700;color:#FF5252">${cur.meta>cur.fat?'−'+ff(cur.meta-cur.fat):'✓ +'+ff(cur.fat-cur.meta)}</span>
        </div>
      </div>
    </div>

    <!-- Fat. Acumulado 2026 e 2025 -->
    <div class="kgrid">
      <div class="kcard">
        <div class="klbl">Fat. Acumulado 2026</div>
        <div class="kval" style="color:var(--primary)">${fk(totFat)}</div>
        <div class="ksub">Jan–${cur.month}</div>
      </div>
      <div class="kcard">
        <div class="klbl">Fat. Acumulado 2025</div>
        <div class="kval" style="color:rgba(91,155,245,.9)">${tot25>0?fk(tot25):'—'}</div>
        <div class="ksub">mesmo período${var2526!==null?` · <span class="badge ${var2526>=0?'g':'r'}" style="padding:1px 5px;font-size:9px">${var2526>=0?'▲ +':'▼ '}${Math.abs(var2526).toFixed(1)}%</span>`:''}</div>
      </div>
      <div class="kcard">
        <div class="klbl">Margem ${cur.month}</div>
        <div class="kval" style="color:${mcol(cur.mg||0)}">${(cur.mg||0).toFixed(1)}%</div>
        <div class="ksub">mês atual</div>
      </div>
      <div class="kcard">
        <div class="klbl">Clientes Atendidos</div>
        <div class="kval" style="color:var(--primary)">${DD.totalClients||0}</div>
        <div class="ksub">Jan–${cur.month}/2026</div>
      </div>
    </div>
  </div>`;

  // ── Comparativo mensal — gráfico de linhas fat 2026 + meta + fat 2025 ───────
  let comp26Svg = '';
  (function(){
    const W=300, H=110, pad=12;
    const vals25  = DD.m26.map(m=>{ const r=DD.m25?DD.m25.find(x=>x.month===m.month):null; return r?r.fat:0; });
    const metas25 = DD.m26.map(m=>{ const r=DD.m25?DD.m25.find(x=>x.month===m.month):null; return r?r.meta||0:0; });
    const vals26  = DD.m26.map(m=>m.fat);
    const metas26 = DD.m26.map(m=>m.meta||0);
    const maxV    = Math.max(...vals26,...metas26,...vals25,...metas25,1);
    const px = (j)=> pad + j*(W-pad*2)/(Math.max(DD.m26.length-1,1));
    const py = (v)=> H - pad - (v/maxV)*(H-pad*2);

    const pts26    = DD.m26.map((m,j)=>[px(j), py(m.fat)]);
    const pts25    = vals25.map((v,j)=>[px(j), py(v)]);
    const ptsMeta26= metas26.map((v,j)=>[px(j), py(v)]);
    const ptsMeta25= metas25.map((v,j)=>[px(j), py(v)]);

    const poly26    = pts26.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
    const poly25    = pts25.filter((_,j)=>vals25[j]>0).map((_,i)=>{ const j=vals25.map((v,k)=>v>0?k:-1).filter(k=>k>=0)[i]; return pts25[j][0].toFixed(1)+','+pts25[j][1].toFixed(1); }).join(' ');
    const polyMeta26= ptsMeta26.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
    const polyMeta25= ptsMeta25.filter((_,j)=>metas25[j]>0).map((_,i)=>{ const j=metas25.map((v,k)=>v>0?k:-1).filter(k=>k>=0)[i]; return ptsMeta25[j][0].toFixed(1)+','+ptsMeta25[j][1].toFixed(1); }).join(' ');
    const area26    = `${pts26[0][0].toFixed(1)},${H} `+poly26+` ${pts26[pts26.length-1][0].toFixed(1)},${H}`;

    const dots = DD.m26.map((m,j)=>{
      const [x,y26]  = pts26[j];
      const [,y25]   = pts25[j];
      const [,ym26]  = ptsMeta26[j];
      const [,ym25]  = ptsMeta25[j];
      const isCur    = m.month===DD.curMonth;
      const col26    = isCur?'var(--primary)':'var(--warn)';
      const has25    = vals25[j]>0;
      const hasMeta25= metas25[j]>0;
      return `
        <circle cx="${x.toFixed(1)}" cy="${y26.toFixed(1)}" r="${isCur?4:2.5}" fill="${col26}" stroke="var(--surf)" stroke-width="1.5"/>
        <text x="${x.toFixed(1)}" y="${(y26-7).toFixed(1)}" text-anchor="middle" font-size="7" fill="${col26}" font-weight="${isCur?'800':'600'}">${fk(m.fat)}</text>
        ${has25?`<circle cx="${x.toFixed(1)}" cy="${y25.toFixed(1)}" r="2" fill="rgba(91,155,245,.9)" stroke="var(--surf)" stroke-width="1"/>
        <text x="${x.toFixed(1)}" y="${(y25+14).toFixed(1)}" text-anchor="middle" font-size="6.5" fill="rgba(91,155,245,.75)" font-weight="600">${fk(vals25[j])}</text>`:''}
        <text x="${x.toFixed(1)}" y="${(H+10).toFixed(1)}" text-anchor="middle" font-size="7" fill="${isCur?'var(--primary)':'rgba(255,255,255,.35)'}" font-weight="${isCur?'700':'400'}">${m.month}</text>`;
    }).join('');

    const has25Fat  = vals25.some(v=>v>0);
    const has25Meta = metas25.some(v=>v>0);
    const svg = `<svg viewBox="0 0 ${W} ${H+14}" style="width:100%;overflow:visible">
      <defs><linearGradient id="cg26" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--primary)" stop-opacity="0.2"/>
        <stop offset="100%" stop-color="var(--primary)" stop-opacity="0.02"/>
      </linearGradient></defs>
      <polygon points="${area26}" fill="url(#cg26)"/>
      ${has25Fat && poly25?`<polyline points="${poly25}" fill="none" stroke="rgba(91,155,245,.8)" stroke-width="2" stroke-linejoin="round"/>`:''}
      ${has25Meta && polyMeta25?`<polyline points="${polyMeta25}" fill="none" stroke="rgba(255,200,0,.45)" stroke-width="1.5" stroke-dasharray="4,3" stroke-linejoin="round"/>`:''}
      <polyline points="${polyMeta26}" fill="none" stroke="rgba(255,200,0,.8)" stroke-width="1.5" stroke-dasharray="4,3" stroke-linejoin="round"/>
      <polyline points="${poly26}" fill="none" stroke="var(--primary)" stroke-width="2.5" stroke-linejoin="round"/>
      ${dots}
    </svg>`;

    const leg25Fat  = has25Fat  ? `<span><span style="display:inline-block;width:16px;height:2px;background:rgba(91,155,245,.8);margin-right:4px;vertical-align:middle"></span>Fat. 2025</span>` : '';
    const leg25Meta = has25Meta ? `<span><span style="display:inline-block;width:16px;height:2px;background:rgba(255,200,0,.45);border-top:2px dashed rgba(255,200,0,.45);margin-right:4px;vertical-align:middle"></span>Meta 2025</span>` : '';
    comp26Svg = `
    <div class="card">
      <div class="ctitle">📈 Evolução Mensal FAT 2025 vs 2026</div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:6px;display:flex;gap:12px;flex-wrap:wrap">
        <span><span style="display:inline-block;width:16px;height:2.5px;background:var(--primary);margin-right:4px;vertical-align:middle"></span>Fat. 2026</span>
        ${leg25Fat}
        <span><span style="display:inline-block;width:16px;height:2px;background:rgba(255,200,0,.8);border-top:2px dashed rgba(255,200,0,.8);margin-right:4px;vertical-align:middle"></span>Meta 2026</span>
        ${leg25Meta}
      </div>
      ${svg}
    </div>`;
  })();
  const comp26 = comp26Svg;
  const comp2526 = '';

  // ── Devoluções por mês ────────────────────────────────────────────────────
  let devExpanded = null;
  const maxDev = Math.max(...DD.m26.map(m=>m.dev||0),1);

  function buildDevCard() {
    const devRows = DD.m26.filter(m=>m.dev>0).map(m=>{
      const pct   = (m.dev/maxDev*100).toFixed(0);
      const isCur = m.month===DD.curMonth;
      const isExp = devExpanded === m.month;
      const clis  = (DD.devClients && DD.devClients[m.month]) || [];
      const drill = isExp && clis.length ? `
        <div style="margin-top:8px;padding:8px;background:var(--raised);border-radius:8px">
          <div style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">Clientes com devolução</div>
          ${clis.map(c=>`
            <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px">
              <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)">${c.name}</span>
              <span style="font-weight:700;color:var(--danger);margin-left:8px;flex-shrink:0">${ff(c.dev)}</span>
            </div>`).join('')}
        </div>` : '';
      return `<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
          <div style="font-size:11px;font-weight:600;color:${isCur?'var(--primary)':'var(--text)'}">${m.month}</div>
          <div style="font-size:11px;font-weight:700;color:var(--danger)">${ff(m.dev)}</div>
        </div>
        <div class="pbar"><div class="pfill r" style="width:${pct}%"></div></div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">${m.fat>0?(m.dev/m.fat*100).toFixed(1)+'% do faturamento':''}</div>
        <div onclick="toggleDev('${m.month}')" style="margin-top:5px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--primary);padding:3px 8px;border:1px solid var(--primary);border-radius:20px;opacity:.8">
          ${isExp?'▲ Fechar':'▼ Clique e veja os clientes'}
        </div>
        ${drill}
      </div>`;
    }).join('') || '<p style="color:var(--muted);font-size:12px">Sem devoluções</p>';

    return `<div class="card">
      <div class="ctitle">↩️ Devoluções por Mês</div>
      ${devRows}
    </div>`;
  }

  window.toggleDev = function(month) {
    devExpanded = devExpanded === month ? null : month;
    const el = document.getElementById('dev-card');
    if (el) el.outerHTML = '<div id="dev-card">' + buildDevCard() + '</div>';
  };

  const devCard = '<div id="dev-card">' + buildDevCard() + '</div>';

  // ── Pizza de categorias ───────────────────────────────────────────────────
  const COLORS = ['#00D68F','#5B9BF5','#F6B54A','#FF5252','#C084FC','#38BDF8','#FB923C','#A3E635','#E879F9','#FCD34D','#64748b'];
  const topCats   = [...DD.categories].slice(0,10);
  const totalCats = DD.categories.reduce((s,c)=>s+c.total,0);
  const otherTot  = totalCats - topCats.reduce((s,c)=>s+c.total,0);
  const donutList = [...topCats,...(otherTot>0?[{name:'Outros',total:otherTot,mg:0,curFat:0}]:[])];
  let acc=0;
  const segs = donutList.map((c,i)=>{
    const pct=totalCats>0?c.total/totalCats*100:0;
    const s={pct,color:COLORS[i]||'#64748b',start:acc}; acc+=pct; return s;
  });
  const donutGrad = segs.map(s=>`${s.color} ${s.start.toFixed(1)}% ${(s.start+s.pct).toFixed(1)}%`).join(',');
  const catLegend = donutList.map((c,i)=>`

function renderDirCli() {
  const DD = DIRECTOR_DATA;
  if (!DD || !DD.topClients || !DD.topClients.length) {
    document.getElementById('dt-cli').innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px">Sem dados</p>';
    return;
  }

  let cliExpanded = null;
  let cliFiltro   = '';
  const clients   = DD.topClients;
  const maxCli    = Math.max(...clients.map(c=>c.fat), 1);

  function buildCliRow(c, globalIdx) {
    const isExp = cliExpanded === globalIdx;

    let lineChart = '';
    if (isExp && c.m26 && c.m26.length > 1) {
      const vals = c.m26.map(m=>m.fat);
      const maxV = Math.max(...vals, 1);
      const W = 280, H = 60, pad = 6;
      const pts = vals.map((v,j)=>{
        const x = pad + j*(W-pad*2)/(Math.max(vals.length-1,1));
        const y = H - pad - (v/maxV)*(H-pad*2);
        return [x,y];
      });
      const polyline = pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
      const area = `${pts[0][0].toFixed(1)},${H} ` + polyline + ` ${pts[pts.length-1][0].toFixed(1)},${H}`;
      const dots = pts.map(([x,y],j)=>{
        const mk = c.m26[j].month;
        const v  = vals[j];
        const isCurM = mk===DD.curMonth;
        return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${isCurM?4:2.5}" fill="${isCurM?'var(--primary)':'var(--warn)'}" stroke="var(--surf)" stroke-width="1.5"/>
          <text x="${x.toFixed(1)}" y="${(y-8).toFixed(1)}" text-anchor="middle" font-size="7" fill="${isCurM?'var(--primary)':'rgba(255,255,255,.7)'}" font-weight="700">${v>0?fk(v):''}</text>
          <text x="${x.toFixed(1)}" y="${(H+9).toFixed(1)}" text-anchor="middle" font-size="7" fill="${isCurM?'var(--primary)':'rgba(255,255,255,.35)'}">${mk}</text>`;
      }).join('');
      lineChart = `<div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border)">
        <svg viewBox="0 0 ${W} ${H+14}" style="width:100%;overflow:visible">
          <defs><linearGradient id="clg${globalIdx}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="var(--primary)" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="var(--primary)" stop-opacity="0.02"/>
          </linearGradient></defs>
          <polygon points="${area}" fill="url(#clg${globalIdx})"/>
          <polyline points="${polyline}" fill="none" stroke="var(--primary)" stroke-width="1.8" stroke-linejoin="round"/>
          ${dots}
        </svg>
      </div>`;
    }

    return `<div style="margin-bottom:10px;cursor:pointer;border-bottom:1px solid var(--border);padding-bottom:10px" onclick="toggleCli(${globalIdx})">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
        <div style="font-size:11px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${globalIdx+1}. ${c.name}</div>
        <div style="display:flex;align-items:center;gap:6px;margin-left:8px;flex-shrink:0">
          <span style="font-size:11px;font-weight:700;color:var(--primary)">${ff(c.fat)}</span>
          <span style="font-size:10px;color:var(--muted)">${isExp?'▲':'▼'}</span>
        </div>
      </div>
      <div class="pbar"><div class="pfill g" style="width:${(c.fat/maxCli*100).toFixed(0)}%"></div></div>
      <div style="font-size:10px;color:var(--muted);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap">
        ${c.city?`<span>${c.city}</span>`:''}
        <span>Fat. <strong style="color:var(--primary)">${ff(c.fat)}</strong></span>
        ${c.curFat>0
          ? `<span>Mg ${DD.curMonth} <span style="color:${mcol(c.mg)};font-weight:700">${c.mg.toFixed(1)}%</span></span>`
          : `<span style="color:var(--warn);font-weight:700">⚠ não comprou esse mês</span>`}
        ${c.dev>0?`<span style="color:var(--danger);font-weight:700">Dev ${fk(c.dev)}</span>`:''}
      </div>
      ${lineChart}
    </div>`;
  }

  function renderCliList() {
    const q = cliFiltro.toLowerCase().trim();
    const filtered = q
      ? clients.filter(c => c.name.toLowerCase().includes(q))
      : clients;
    const info = q
      ? `<div style="font-size:11px;color:var(--muted);margin-bottom:10px">${filtered.length} resultado(s) para "<strong style="color:var(--text)">${q}</strong>"</div>`
      : `<div style="font-size:11px;color:var(--muted);margin-bottom:10px">${clients.length} clientes · acumulado 2026 acima de R$3k</div>`;
    const rows = filtered.map(c => buildCliRow(c, clients.indexOf(c))).join('');
    document.getElementById('cli-list').innerHTML = info + (rows || '<p style="color:var(--muted);font-size:12px;text-align:center;padding:20px">Nenhum cliente encontrado</p>');
  }

  document.getElementById('dt-cli').innerHTML = `
    <div class="card">
      <div class="ctitle">👥 Clientes — acumulado 2026</div>
      <div style="margin-bottom:12px">
        <input id="cli-search" type="text" placeholder="🔍  Buscar por nome do cliente..."
          style="width:100%;padding:10px 12px;background:var(--raised);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;box-sizing:border-box;outline:none"
          oninput="cliSearch(this.value)">
      </div>
      <div id="cli-list"></div>
    </div>`;

  window.cliSearch = function(val) {
    cliFiltro = val;
    cliExpanded = null;
    renderCliList();
  };

  window.toggleCli = function(i) {
    cliExpanded = cliExpanded === i ? null : i;
    renderCliList();
  };

  renderCliList();
}

function renderDirCid() {
  const DD = DIRECTOR_DATA;
  if (!DD || !DD.cities || !DD.cities.length) {
    document.getElementById('dt-cid').innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px">Sem dados</p>';

  }

  const maxCity    = Math.max(...cities.map(c=>c.fat), 1);

  function buildCityCard() {
    const q = cidFiltro.toLowerCase().trim();

    const info = q
      ? `<div style="font-size:11px;color:var(--muted);margin-bottom:10px">${filtered.length} resultado(s) para "<strong style="color:var(--text)">${q}</strong>"</div>`
      : `<div style="font-size:11px;color:var(--muted);margin-bottom:10px">${cities.length} cidades</div>`;

      const barW = (c.fat/maxCity*100).toFixed(0);
      const isExp = cityExpanded === i;

      let lineChart = '';
      if (isExp && c.m26 && c.m26.length > 1) {
        const vals = c.m26.map(m=>m.fat);
        const maxV = Math.max(...vals, 1);
        const W = 280, H = 56, pad = 6;
        const pts = vals.map((v,j)=>{
          const x = pad + j*(W-pad*2)/(Math.max(vals.length-1,1));
          const y = H - pad - (v/maxV)*(H-pad*2);
          return [x,y];
        });
        const polyline = pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
        const area = `${pts[0][0].toFixed(1)},${H} ` + polyline + ` ${pts[pts.length-1][0].toFixed(1)},${H}`;
        const dots = pts.map(([x,y],j)=>{
          const mk = c.m26[j].month;
          const v  = vals[j];
          const isCurM = mk===DD.curMonth;
          return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${isCurM?4:2.5}" fill="${isCurM?'var(--primary)':'var(--warn)'}" stroke="var(--surf)" stroke-width="1.5"/>
            <text x="${x.toFixed(1)}" y="${(y-8).toFixed(1)}" text-anchor="middle" font-size="7" fill="${isCurM?'var(--primary)':'rgba(255,255,255,.7)'}" font-weight="700">${v>0?fk(v):''}</text>
            <text x="${x.toFixed(1)}" y="${(H+8).toFixed(1)}" text-anchor="middle" font-size="7" fill="${isCurM?'var(--primary)':'rgba(255,255,255,.35)'}">${mk}</text>`;
        }).join('');
        lineChart = `<div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border)">
          <svg viewBox="0 0 ${W} ${H+12}" style="width:100%;overflow:visible">
            <defs><linearGradient id="cg${i}" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="var(--primary)" stop-opacity="0.25"/>
              <stop offset="100%" stop-color="var(--primary)" stop-opacity="0.02"/>
            </linearGradient></defs>
            <polygon points="${area}" fill="url(#cg${i})"/>
            <polyline points="${polyline}" fill="none" stroke="var(--primary)" stroke-width="1.8" stroke-linejoin="round"/>

          </svg>

      }

      return `<div style="margin-bottom:10px;cursor:pointer" onclick="toggleCity(${i})">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <div style="font-size:11px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${i+1}. ${c.name}</div>
          <div style="display:flex;align-items:center;gap:6px;margin-left:8px;flex-shrink:0">
            <span style="font-size:10px;color:var(--muted)">${DD.curMonth}: ${fk(c.curFat)}</span>
            <span style="font-size:11px;font-weight:700;color:var(--primary)">${fk(c.fat)}</span>
            <span style="font-size:10px;color:var(--muted)">${isExp?'▲':'▼'}</span>
          </div>

    }).join('');

    return `<div class="card">
      <div class="ctitle">🗺️ Vendas por Cidade — acumulado 2026</div>
      ${info}
      ${rows || '<p style="color:var(--muted);font-size:12px">Nenhuma cidade encontrada</p>'}
    </div>`;

  window.toggleCity = function(i) {

    if (el) el.outerHTML = '<div id="city-card">' + buildCityCard() + '</div>';

let vendFiltro = '';

function renderVendList() {
  const DD = DIRECTOR_DATA;
  const q = vendFiltro.toLowerCase().trim();
  const vendors = q
    ? DD.vendors.filter(v => v.name.toLowerCase().includes(q) || v.code.includes(q))
    : DD.vendors;

  const info = q
    ? `<div style="font-size:11px;color:var(--muted);margin-bottom:10px">${vendors.length} resultado(s) para "<strong style="color:var(--text)">${q}</strong>"</div>`
    : '';

  const rows = vendors.map((v, filtIdx) => {
    const idx = DD.vendors.indexOf(v);
    const totFat  = v.m26.reduce((s,m)=>s+m.fat,0);
    const totMeta = v.m26.reduce((s,m)=>s+m.meta,0);
    const ating   = totMeta>0?totFat/totMeta*100:0;
    // ── Gráfico de linhas mensal ─────────────────────────────────────────────
    const curM   = v.m26.find(m=>m.month===v.curMonth) || {};
    const metaCur = curM.meta || 0;
    const vals   = v.m26.map(m=>m.fat);
    const metas  = v.m26.map(m=>m.meta||0);
    const maxV   = Math.max(...vals, ...metas, 1);
    const W=280, H=54, pad=8;
    const pts = vals.map((val,j)=>{
      const x = pad + j*(W-pad*2)/(Math.max(vals.length-1,1));
      const y = H - pad - (val/maxV)*(H-pad*2);
      return [x,y];
    });
    const ptsMeta = metas.map((val,j)=>{
      const x = pad + j*(W-pad*2)/(Math.max(metas.length-1,1));
      const y = H - pad - (val/maxV)*(H-pad*2);
      return [x,y];
    });
    const polyline = pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
    const polyMeta = ptsMeta.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
    const areaFat  = `${pts[0][0].toFixed(1)},${H} ` + polyline + ` ${pts[pts.length-1][0].toFixed(1)},${H}`;
    const lineChart = `<svg viewBox="0 0 ${W} ${H+14}" style="width:100%;overflow:visible;margin-top:8px">
      <defs><linearGradient id="vg${idx}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--primary)" stop-opacity="0.2"/>
        <stop offset="100%" stop-color="var(--primary)" stop-opacity="0.01"/>
      </linearGradient></defs>
      <polygon points="${areaFat}" fill="url(#vg${idx})"/>
      <polyline points="${polyline}" fill="none" stroke="var(--primary)" stroke-width="1.8" stroke-linejoin="round"/>
      <polyline points="${polyMeta}" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1" stroke-dasharray="3,3"/>
      ${pts.map(([x,y],j)=>{
        const m   = v.m26[j];
        const isCur = m.month===v.curMonth;
        const col = isCur?'var(--primary)':'var(--warn)';
        return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${isCur?4:2.5}" fill="${col}" stroke="var(--surf)" stroke-width="1.5"/>
          <text x="${x.toFixed(1)}" y="${(y-7).toFixed(1)}" text-anchor="middle" font-size="7" fill="${col}" font-weight="${isCur?'800':'600'}">${fk(m.fat)}</text>
          <text x="${x.toFixed(1)}" y="${(H+10).toFixed(1)}" text-anchor="middle" font-size="7" fill="${isCur?'var(--primary)':'rgba(255,255,255,.35)'}" font-weight="${isCur?'700':'400'}">${m.month}</text>`;
      }).join('')}
    </svg>`;

    const isExp = dirVendExpanded === idx;

    // ── Drill-down: categorias estilo Meta Categorias + clientes 2026 ─────────
    let drillHtml = '';
    if (isExp) {
      // Categorias
      const catRows = CAT_METAS.map((cm, ci) => {
        const catEntry = (v.cats||[]).find(c=>c.name.toUpperCase()===cm.name.toUpperCase()) || {};
        const metaCat  = Math.round(metaCur * cm.pct);
        const fatCat   = catEntry.curFat || 0;
        const falta    = Math.max(metaCat - fatCat, 0);
        const excede   = Math.max(fatCat - metaCat, 0);
        const ating2   = metaCat > 0 ? fatCat / metaCat * 100 : 0;
        const cls2     = ating2 >= 100 ? 'g' : ating2 >= 65 ? 'y' : 'r';
        const barW2    = Math.min(ating2, 100).toFixed(1);
        const catKey   = `${idx}-${ci}`;
        const catIsExp = !!vendCatExpMap[catKey];

        let catEvo = '';
        if (catIsExp && catEntry.m26 && catEntry.m26.length > 0) {
          const W=260, H=70, pad=8;
          const months = v.m26.map(m=>m.month);
          const fatMap = {};
          (catEntry.m26||[]).forEach(r=>{ fatMap[r.month]=r.fat; });
          const pts2 = months.map((month,j)=>{
            const fat2 = fatMap[month]||0;
            const mObj = v.m26.find(m=>m.month===month)||{};
            const meta2= Math.round((mObj.meta||0)*cm.pct);
            return {month, fat:fat2, meta:meta2, j};
          });
          const maxV2 = Math.max(...pts2.map(p=>Math.max(p.fat,p.meta)),1);
          const px2 = j=> pad + j*(W-pad*2)/(Math.max(pts2.length-1,1));
          const py2 = vv=> H - pad - (vv/maxV2)*(H-pad*2);
          const pf2 = pts2.map(p=>[px2(p.j),py2(p.fat)]);
          const pm2 = pts2.map(p=>[px2(p.j),py2(p.meta)]);
          const polyF2 = pf2.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
          const polyM2 = pm2.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
          const area2  = `${pf2[0][0].toFixed(1)},${H} `+polyF2+` ${pf2[pf2.length-1][0].toFixed(1)},${H}`;
          const dots2  = pts2.map((p,j)=>{
            const [x2,yf2]=[pf2[j][0],pf2[j][1]];
            const [,ym2]=pm2[j];
            const isCur2=p.month===v.curMonth;
            const col2=isCur2?'var(--primary)':'var(--warn)';
            return `<circle cx="${x2.toFixed(1)}" cy="${yf2.toFixed(1)}" r="${isCur2?3:2}" fill="${col2}" stroke="var(--surf)" stroke-width="1"/>
              <text x="${x2.toFixed(1)}" y="${(yf2-6).toFixed(1)}" text-anchor="middle" font-size="6" fill="${col2}" font-weight="700">${p.fat>0?fk(p.fat):''}</text>
              <circle cx="${x2.toFixed(1)}" cy="${ym2.toFixed(1)}" r="1.5" fill="rgba(255,200,0,.5)" stroke="none"/>
              <text x="${x2.toFixed(1)}" y="${(H+9).toFixed(1)}" text-anchor="middle" font-size="6" fill="${isCur2?'var(--primary)':'rgba(255,255,255,.3)'}">${p.month}</text>`;
          }).join('');
          catEvo = `<div style="margin-top:6px;padding:8px;background:var(--surf);border-radius:6px">
            <svg viewBox="0 0 ${W} ${H+12}" style="width:100%;overflow:visible">
              <defs><linearGradient id="vcg${idx}${ci}" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="var(--primary)" stop-opacity="0.2"/>
                <stop offset="100%" stop-color="var(--primary)" stop-opacity="0.02"/>
              </linearGradient></defs>
              <polygon points="${area2}" fill="url(#vcg${idx}${ci})"/>
              <polyline points="${polyM2}" fill="none" stroke="rgba(255,200,0,.6)" stroke-width="1.2" stroke-dasharray="3,3"/>
              <polyline points="${polyF2}" fill="none" stroke="var(--primary)" stroke-width="1.8" stroke-linejoin="round"/>
              ${dots2}
            </svg></div>`;
        }

        return `<div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <div style="font-size:11px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cm.name}</div>
            <span class="badge ${cls2}" style="margin-left:6px;flex-shrink:0;font-size:9px">${ating2.toFixed(1)}%</span>
          </div>
          <div style="position:relative;height:20px;background:#f5c400;border-radius:5px;overflow:hidden;margin-bottom:4px">
            <div style="position:absolute;left:0;top:0;height:100%;width:${barW2}%;background:linear-gradient(90deg,#7b0000,#c0392b);border-radius:5px;display:flex;align-items:center;justify-content:flex-end;padding-right:5px;overflow:hidden">
